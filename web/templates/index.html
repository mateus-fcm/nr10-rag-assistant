<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>EletrIA · NR-10</title>
  <style>
    :root {
      --fundo: #0b0b0c;
      --fundo-caixa: rgba(21, 21, 22, 0.7);
      --texto: #e9e9e9;
      --azul: #8a2be2; /* roxo vibrante */
      --amarelo: #ffcc00;
      --borda: rgba(255,255,255,0.05);
    }
    * {
      box-sizing: border-box;
      font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      background-color: var(--fundo);
      color: var(--texto);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
    }

    /* ===== HEADER ===== */
    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(-10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    header {
      width: 100%;
      text-align: center;
      padding: 50px 0 20px;
      font-size: 2.4rem;
      letter-spacing: 2.5px;
      font-weight: 400;
      color: var(--texto);
      animation: fadeSlide 1s ease-out;
    }
    header span {
      /* gradiente agora em tons de roxo */
      background: linear-gradient(90deg, #9b59b6, #8a2be2 );
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }

    /* ===== CONTAINER ===== */
    .chat-wrapper {
      flex: 1;
      width: 100%;
      max-width: 850px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      margin-top: 20px;
    }

    /* ===== CAIXA DO CHAT ===== */
    .caixa {
    width: 100%;
    background: var(--fundo-caixa);
    backdrop-filter: blur(10px);
    border: 1px solid var(--borda);
    border-radius: 16px;
    padding: 22px 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: 0.3s ease, min-height 0.3s ease;
    min-height: 120px; /* ainda mais compacto */
    }

    /* efeito hover */
    .caixa:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 35px rgba(0,0,0,0.4);
    }

    /* quando o chat estiver vazio */
    .mensagens:empty {
    min-height: 40px; /* altura mínima bem menor */
    display: flex;
    align-items: center;
    justify-content: center;
    }

    /* placeholder visualmente centralizado e sutil */
    .mensagens:empty::before {
    content: "Comece uma conversa sobre a NR-10 ⚡";
    color: rgba(255,255,255,0.35);
    text-align: center;
    font-size: 0.9rem;
    display: block;
    letter-spacing: 0.3px;
    transform: translateY(-8px); /* sobe levemente o texto */
    }
    /* espaçamento suave quando o chat tem conteúdo */
    .mensagens:not(:empty) ~ .input-area {
    margin-top: 10px;
    }
    /* ===== SCROLLBAR ===== */
    .mensagens::-webkit-scrollbar {
      width: 6px;
    }
    .mensagens::-webkit-scrollbar-thumb {
      background-color: #2a2a2a;
      border-radius: 10px;
    }
    .mensagens::-webkit-scrollbar-track {
      background: transparent;
    }
    .mensagens {
      scrollbar-width: thin;
      scrollbar-color: #2a2a2a transparent;
    }

    /* ===== ÁREA DE MENSAGENS ===== */
    .mensagens {
      width: 100%;
      max-height: 400px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 25px;
    }
    .msg {
      padding: 12px 16px;
      border-radius: 10px;
      max-width: 75%;
      line-height: 1.5;
      white-space: pre-wrap;
      font-size: 1rem;
    }
    .usuario {
      align-self: flex-end;
      background: var(--azul);
      color: #fff;
      border-bottom-right-radius: 2px;
    }
    .bot {
      align-self: flex-start;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.05);
      border-bottom-left-radius: 2px;
    }

    /* ===== INPUT ===== */
    .input-area {
      width: 100%;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--borda);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--texto);
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }
    input:focus {
      border-color: var(--azul);
      box-shadow: 0 0 5px rgba(138,43,226,0.3); /* roxo translucido */
    }

    /* ===== BOTÃO ===== */
    button {
      background: var(--azul);
      border: none;
      border-radius: 12px;
      width: 45px;
      height: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }
    button svg {
      width: 20px;
      height: 20px;
      fill: white;
      transition: transform 0.2s ease;
    }
    button:hover {
      background-color: #9b59b6;
      box-shadow: 0 0 10px rgba(149,79,255,0.4);
    }
    button:hover svg {
      transform: translateY(-3px);
    }

    /* ===== FOOTER ===== */
    footer {
      width: 100%;
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
      padding: 20px 0;
      border-top: 1px solid rgba(255,255,255,0.05);
      margin-top: 30px;
    }

    /* ===== LOADER MODERNO ===== */
    .msg.bot.loading {
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .digitando {
      display: flex;
      gap: 6px;
      justify-content: center;
      align-items: center;
      height: 22px;
      margin: 8px 0;
    }
    .dot {
    width: 8px;
    height: 8px;
    background-color: rgba(255, 255, 255, 0.8);
    border-radius: 50%;
    animation: pulsar 1.4s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulsar {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <header><span>EletrIA</span> · NR-10</header>
  <div class="chat-wrapper">
    <div class="caixa">
      <div class="mensagens" id="chat"></div>
      <div class="input-area">
        <input id="pergunta" placeholder="Digite sua dúvida..." onkeydown="if(event.key==='Enter'){enviar()}">
        <button onclick="enviar()" aria-label="Enviar">
          <svg viewBox="0 0 24 24">
            <path d="M4 4l16 8-16 8 4-8-4-8z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
  <footer>Desenvolvido por Mateus Faria • MVP Flask + LangChain + Ollama</footer>

  <script>
  const chat = document.getElementById("chat");

  function addMensagem(texto, classe) {
    const div = document.createElement("div");
    div.className = "msg " + classe;
    div.innerText = texto;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  async function enviar() {
    const pergunta = document.getElementById("pergunta").value.trim();
    if (!pergunta) return;

    addMensagem(pergunta, "usuario");
    document.getElementById("pergunta").value = "";

    const loading = document.createElement("div");
    loading.className = "msg bot loading";
    loading.innerHTML = `
      <div class="digitando">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    `;
    chat.appendChild(loading);
    chat.scrollTop = chat.scrollHeight;

    try {
      // 🔁 envia a pergunta para a API da página principal (porta 5000)
      const resp = await fetch("/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: pergunta })
      });

      const data = await resp.json();
      loading.classList.remove("loading");
      loading.innerText = data.answer;
    } catch (e) {
      loading.classList.remove("loading");
      loading.innerText = "❌ Erro na conexão com o servidor.";
    }
  }
</script>
</body>
</html>
