<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nr10-rag-assistant</title>
  <style>
    :root {
      --bg: #101214;
      --panel: #181b1f;
      --panel-2: #22262b;
      --text: #f2f4f5;
      --muted: #aeb7bd;
      --accent: #f5b400;
      --accent-dark: #c98f00;
      --border: #30363d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 24px clamp(16px, 4vw, 48px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2vw, 1.7rem);
      letter-spacing: 0;
    }

    .status {
      color: var(--muted);
      font-size: 0.9rem;
    }

    main {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 28px clamp(16px, 4vw, 32px);
      flex: 1;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 18px;
    }

    #chat {
      min-height: 420px;
      max-height: calc(100vh - 220px);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-right: 4px;
    }

    .message {
      max-width: min(760px, 92%);
      border: 1px solid var(--border);
      padding: 13px 15px;
      border-radius: 8px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .user {
      align-self: flex-end;
      background: #26313a;
    }

    .assistant {
      align-self: flex-start;
      background: var(--panel);
    }

    form {
      display: grid;
      grid-template-columns: 1fr 48px;
      gap: 10px;
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    input {
      width: 100%;
      min-width: 0;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1rem;
      padding: 13px 14px;
      outline: none;
    }

    input:focus { border-color: var(--accent); }

    button {
      width: 48px;
      height: 48px;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #161616;
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    button:hover { background: var(--accent-dark); }

    button svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }
  </style>
</head>
<body>
  <header>
    <h1>nr10-rag-assistant</h1>
    <div class="status">RAG local com Ollama + ChromaDB</div>
  </header>

  <main>
    <section id="chat" aria-live="polite"></section>
    <form id="form">
      <input id="question" autocomplete="off" placeholder="Digite uma pergunta tecnica..." />
      <button type="submit" aria-label="Enviar pergunta">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 11.2 19.6 3a1 1 0 0 1 1.35 1.26l-6.1 16.9a1 1 0 0 1-1.86.04l-3.1-7.05-6.93-3.1a1 1 0 0 1 .04-1.85Zm3.03-.98 5.04 2.26 2.29 5.22 4.26-11.82-11.59 4.34Z"/>
        </svg>
      </button>
    </form>
  </main>

  <script>
    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("question");

    function addMessage(text, role) {
      const message = document.createElement("div");
      message.className = `message ${role}`;
      message.innerText = text;
      chat.appendChild(message);
      chat.scrollTop = chat.scrollHeight;
      return message;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const question = input.value.trim();
      if (!question) return;

      addMessage(question, "user");
      input.value = "";
      const pending = addMessage("Consultando a base local...", "assistant");

      try {
        const response = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });
        const data = await response.json();
        pending.innerText = data.answer || "Sem resposta retornada.";
      } catch (error) {
        pending.innerText = "Nao foi possivel conectar ao servidor Flask.";
      }
    });
  </script>
</body>
</html>
